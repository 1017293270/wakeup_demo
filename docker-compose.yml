services:
  mysql:
    image: mysql:8.4
    container_name: wakeup-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${VOICE_MYSQL_DATABASE:-wakeup_demo}
      MYSQL_USER: ${VOICE_MYSQL_USER:-wakeup_user}
      MYSQL_PASSWORD: ${VOICE_MYSQL_PASSWORD:?VOICE_MYSQL_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  voice-service:
    build:
      context: ./voice-service
    container_name: wakeup-voice-service
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    expose:
      - "8766"
    environment:
      VOICE_MYSQL_HOST: mysql
      VOICE_MYSQL_PORT: 3306
    ports:
      - "127.0.0.1:${VOICE_SERVICE_PORT:-8766}:8766"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_VOICE_WS_URL: ${VITE_VOICE_WS_URL:-}
    container_name: wakeup-frontend
    restart: unless-stopped
    depends_on:
      - voice-service
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mysql-data:
